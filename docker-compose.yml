version: '3.8'

services:
  hammad-buckle-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hammad-buckle-production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - hammad-buckle-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: hammad-buckle-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - hammad-buckle-app
    networks:
      - hammad-buckle-network
    restart: unless-stopped

networks:
  hammad-buckle-network:
    driver: bridge

volumes:
  logs:
    driver: local
